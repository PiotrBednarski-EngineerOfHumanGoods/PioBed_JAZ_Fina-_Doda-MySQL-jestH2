spring:
  main:
    banner-mode: off

  datasource:
    url: jdbc:h2:mem:piobed-db
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: info

my:
  custom:
    property: Hello from application yml

custom:
  enabled: false

app:
  environment: DEV
  owner:
    name: Piotr
    university: PJATK
  values:
    - first
    - second
    - third

server:
  port: 8081
